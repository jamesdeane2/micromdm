name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 09:00 UTC
    - cron: '0 9 * * 1'

jobs:
  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF to Code Scanning
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Machine-readable results for the CVE dashboard (incl. reachability).
      - name: Run govulncheck (SARIF)
        run: govulncheck -format sarif ./... > govulncheck.sarif
        continue-on-error: true   # still upload + gate even when vulns are found

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck

      # Keep the hard fail — a red build is the early-warning signal.
      - name: Fail on reachable vulnerabilities
        run: govulncheck ./...

      - name: Check go.mod tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
